proxy:
  enable: true
  http_proxy: "http://127.0.0.1:10808"
  https_proxy: "http://127.0.0.1:10808"

pricing:
  enable: true
  coingecko_endpoint: "https://api.coingecko.com/api/v3/simple/price"
  map:
    BTC: bitcoin
    ETH: ethereum
    BNB: binancecoin
    SOL: solana
    MATIC: polygon
    AVAX: avalanche-2
    FTM: fantom
    USDT: tether
    USDC: usd-coin
    DAI: dai

chains:
  # 1. BTC —— 走的是你现在 scanner 里那套 esplora
  - name: bitcoin
    type: bitcoin
    esplora: "https://mempool.space/api,https://blockstream.info/api"

  # 2. ETH 主网
  - name: ethereum
    type: evm
    rpc: "https://eth.llamarpc.com https://rpc.ankr.com/eth https://cloudflare-eth.com"
    erc20:
      - symbol: USDT
        address: "0xdAC17F958D2ee523a2206206994597C13D831ec7"
      - symbol: USDC
